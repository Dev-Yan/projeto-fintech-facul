<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css">

<a href="home.html"><div class="bi bi-arrow-bar-left icon"> volte </div></a>
<body>
    <div class="form-body">
        <div class="row">
            <div class="form-holder">
                <div class="form-content">
                    <div class="form-items">
                        <h3>Entre</h3>
                        <p>Preencha seus dados para acessar a plataforma:</p>
                        <form class="requires-validation" novalidate>

                            <div class="col-md-12">
                                <input class="form-control" type="text" name="name" placeholder="Nome" required>

                                <div class="invalid-feedback">Campo obrigatório!</div>
                            </div>

                            <div class="col-md-12">
                                <input class="form-control" type="password" name="password" placeholder="Senha"
                                    required>

                                <div class="invalid-feedback">Campo obrigatório!</div>
                            </div>
                            <br>
                            <a href="#" class="forget-password"> Esqueceu a senha?</a>
                            <div class="form-button mt-3">
                                <button type="submit" class="btn btn-primary">Entre</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
